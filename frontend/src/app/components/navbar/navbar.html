<nav class="navbar">
  <div class="navbar-container">
    <a [routerLink]="['/', locale(), 'home']" class="navbar-brand">
      <img src="/arte_catolica_navbar_1080x270.png" [alt]="'nav.brand' | t" class="brand-logo" />
    </a>

    <button
      class="menu-toggle"
      type="button"
      (click)="toggleMenu()"
      [attr.aria-expanded]="isMenuOpen()"
      [attr.aria-label]="'nav.openMenu' | t"
    >
      <span></span>
      <span></span>
      <span></span>
    </button>

    <div class="navbar-menu" [class.open]="isMenuOpen()">
      <a
        [routerLink]="['/', locale(), 'products']"
        routerLinkActive="active"
        class="nav-link"
        (click)="closeMenu()"
      >
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor">
          <path
            d="M6 7h12l-1 12H7L6 7Z"
            stroke-width="1.8"
            stroke-linecap="round"
            stroke-linejoin="round"
          />
          <path
            d="M9 7V5a3 3 0 0 1 6 0v2"
            stroke-width="1.8"
            stroke-linecap="round"
            stroke-linejoin="round"
          />
        </svg>
        {{ 'nav.products' | t }}
      </a>
      <a
        [routerLink]="['/', locale(), 'artists']"
        routerLinkActive="active"
        class="nav-link"
        (click)="closeMenu()"
      >
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor">
          <path d="M12 3v18" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" />
          <path d="M7 8h10" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" />
          <path d="M7 12h10" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" />
          <path d="M7 16h10" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" />
        </svg>
        {{ 'nav.artists' | t }}
      </a>
      <div class="nav-dropdown" [class.open]="isCatalogOpen()">
        <button
          type="button"
          class="nav-dropdown-trigger"
          (click)="toggleCatalog()"
          [attr.aria-expanded]="isCatalogOpen()"
          aria-haspopup="true"
        >
          <svg
            class="nav-icon"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="1.8"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <circle cx="12" cy="12" r="10" />
            <path d="M2 12h20" />
            <path
              d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"
            />
          </svg>
          <span>{{ 'nav.explore' | t }}</span>
          <svg
            class="chevron"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <path d="M6 9l6 6 6-6" stroke-linecap="round" stroke-linejoin="round" />
          </svg>
        </button>
        <div class="nav-dropdown-menu">
          <a
            [routerLink]="['/', locale(), 'about']"
            routerLinkActive="active"
            class="nav-dropdown-item"
            (click)="closeMenu()"
          >
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor">
              <path
                d="M12 12a4 4 0 1 0-4-4"
                stroke-width="1.8"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
              <path
                d="M16 8a4 4 0 1 1-4 4"
                stroke-width="1.8"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
              <path
                d="M4 20a4 4 0 0 1 6-3"
                stroke-width="1.8"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
              <path
                d="M14 17a4 4 0 0 1 6 3"
                stroke-width="1.8"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
            </svg>
            {{ 'nav.about' | t }}
          </a>
          <a
            [routerLink]="['/', locale(), 'categories']"
            routerLinkActive="active"
            class="nav-dropdown-item"
            (click)="closeMenu()"
          >
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor">
              <path
                d="M4 4h6v6H4zM14 4h6v6h-6zM4 14h6v6H4zM14 14h6v6h-6z"
                stroke-width="1.8"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
            </svg>
            {{ 'nav.categories' | t }}
          </a>
          <a
            [routerLink]="['/', locale(), 'techniques']"
            routerLinkActive="active"
            class="nav-dropdown-item"
            (click)="closeMenu()"
          >
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor">
              <path
                d="M12 19l7-7 3 3-7 7-3-3z"
                stroke-width="1.8"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
              <path
                d="M18 13l-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"
                stroke-width="1.8"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
            </svg>
            {{ 'nav.techniques' | t }}
          </a>
        </div>
      </div>
      <a
        [routerLink]="['/', locale(), 'cart']"
        routerLinkActive="active"
        class="cart-link nav-link"
        (click)="closeMenu()"
      >
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor">
          <path
            d="M6 6h14l-2 9H8L6 6Z"
            stroke-width="1.8"
            stroke-linecap="round"
            stroke-linejoin="round"
          />
          <path d="M6 6l-2-3" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" />
          <circle
            cx="9"
            cy="20"
            r="1.5"
            stroke-width="1.8"
            stroke-linecap="round"
            stroke-linejoin="round"
          />
          <circle
            cx="17"
            cy="20"
            r="1.5"
            stroke-width="1.8"
            stroke-linecap="round"
            stroke-linejoin="round"
          />
        </svg>
        <span>{{ 'nav.cart' | t }}</span>
        <span class="cart-badge" *ngIf="cartItemCount() > 0">
          {{ cartItemCount() }}
        </span>
      </a>

      <div class="nav-lang" [class.open]="isLangOpen()">
        <button
          type="button"
          class="nav-lang-trigger"
          (click)="toggleLang()"
          [attr.aria-expanded]="isLangOpen()"
          aria-haspopup="true"
          [attr.aria-label]="'Language'"
        >
          <span class="flag">{{ locale() === 'es' ? '🇪🇸' : '🇺🇸' }}</span>
          <svg
            class="chevron"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <path d="M6 9l6 6 6-6" stroke-linecap="round" stroke-linejoin="round" />
          </svg>
        </button>
        <div class="nav-lang-menu">
          <button
            type="button"
            class="nav-lang-item"
            [class.active]="locale() === 'es'"
            (click)="selectLocale('es')"
          >
            <span class="flag">🇪🇸</span>
            Español
          </button>
          <button
            type="button"
            class="nav-lang-item"
            [class.active]="locale() === 'en'"
            (click)="selectLocale('en')"
          >
            <span class="flag">🇺🇸</span>
            English
          </button>
        </div>
      </div>

      <ng-container *ngIf="isAuthenticated(); else loginLink">
        <a
          [routerLink]="['/', locale(), 'profile']"
          routerLinkActive="active"
          class="nav-link"
          (click)="closeMenu()"
        >
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor">
            <circle
              cx="12"
              cy="8"
              r="4"
              stroke-width="1.8"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
            <path
              d="M4 21a8 8 0 0 1 16 0"
              stroke-width="1.8"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
          </svg>
          {{ 'nav.myArea' | t }}
        </a>
        <a [routerLink]="['/', locale(), 'home']" (click)="logout()" class="logout-link">
          {{ 'nav.logout' | t }}
        </a>
        <span class="user-name">{{ user()?.name }}</span>
      </ng-container>
      <ng-template #loginLink>
        <a
          [routerLink]="['/', locale(), 'login']"
          routerLinkActive="active"
          class="nav-link"
          (click)="closeMenu()"
        >
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor">
            <path
              d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"
              stroke-width="1.8"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
            <path
              d="M10 17l5-5-5-5"
              stroke-width="1.8"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
            <path d="M15 12H3" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" />
          </svg>
          {{ 'nav.login' | t }}
        </a>
      </ng-template>
    </div>
  </div>
</nav>
