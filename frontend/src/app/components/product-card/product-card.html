<div class="product-card">
  <a
    [routerLink]="['/es/artist', product.artist_id || product.vendor?.id]"
    class="artist-link"
    [attr.aria-label]="'Artista: ' + (product.artist?.name || product.vendor?.name || 'Artista')"
  >
    <svg
      class="artist-icon"
      viewBox="0 0 24 24"
      fill="none"
      stroke="currentColor"
      stroke-width="1.8"
      stroke-linecap="round"
      stroke-linejoin="round"
      aria-hidden="true"
    >
      <circle cx="12" cy="8" r="4" />
      <path d="M4 21a8 8 0 0 1 16 0" />
    </svg>
    <span class="artist-name">{{ product.artist?.name || product.vendor?.name || 'Artista' }}</span>
    <span
      *ngIf="artistCountry()"
      class="artist-flag"
      [title]="artistCountry()"
      aria-hidden="true"
      >{{ countryFlag(artistCountry()) }}</span
    >
  </a>
  <div class="card-content">
    <a [routerLink]="['/es/products', product.id]" class="product-link">
      <div class="product-image">
        <img [src]="currentImage()" [alt]="product.name" />
        <button
          class="gallery-arrow left"
          *ngIf="hasGallery()"
          (click)="prevImage($event)"
          aria-label="Imagen anterior"
        >
          ‹
        </button>
        <button
          class="gallery-arrow right"
          *ngIf="hasGallery()"
          (click)="nextImage($event)"
          aria-label="Imagen siguiente"
        >
          ›
        </button>
        <div class="gallery-dots" *ngIf="hasGallery()">
          <span
            class="dot"
            *ngFor="let index of galleryIndices()"
            [class.active]="index === imageIndex()"
          ></span>
        </div>
      </div>
      <div class="product-info">
        <h3 class="product-name">{{ product.name }}</h3>
        <p class="product-price">{{ formatPrice(product.price) }}</p>
        <p class="product-delivery" *ngIf="firstShipDate()">
          <svg
            class="delivery-calendar-icon"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
            aria-hidden="true"
          >
            <rect x="3" y="4" width="18" height="18" rx="2" ry="2" />
            <line x1="16" y1="2" x2="16" y2="6" />
            <line x1="8" y1="2" x2="8" y2="6" />
            <line x1="3" y1="10" x2="21" y2="10" />
          </svg>
          Entrega desde {{ formatDateDDMMYYYY(firstShipDate()) }}
        </p>
      </div>
    </a>
  </div>
  <button class="add-to-cart-btn" (click)="addToCart($event)">Agregar al Carrito</button>
</div>
