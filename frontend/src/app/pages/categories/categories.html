<div class="categories-page">
  <div class="container">
    <div class="marketing-block">
      <h1>Categorías</h1>
      <p class="subtitle">
        Explora nuestras categorías de arte religioso y descubre colecciones pensadas para cada
        devoción.
      </p>
    </div>

    <div class="loading" *ngIf="isLoading()">
      <p>Cargando categorías...</p>
    </div>

    <div class="categories-grid" *ngIf="!isLoading()">
      <a
        *ngFor="let category of categories()"
        [routerLink]="['/es', 'categories', category.slug]"
        class="category-card"
      >
        <div class="category-card-image" *ngIf="category.image_url">
          <img [src]="category.image_url" [alt]="category.name" loading="lazy" />
        </div>
        <div class="category-card-content">
          <h3>{{ category.name }}</h3>
          <p>{{ category.description }}</p>
        </div>
      </a>
    </div>
  </div>
</div>
