<div class="artists-page">
  <div class="container">
    <div class="breadcrumb" *ngIf="currentType()">
      <a routerLink="/es/artists">Artistas</a>
      <span class="sep">›</span>
      <span class="current">{{ currentType()?.name }}</span>
    </div>

    <div class="marketing-block">
      <h1>Artistas</h1>
      <p class="subtitle">Conoce a nuestros artistas y sus colecciones.</p>
    </div>

    <div class="loading" *ngIf="isLoading()">
      <p>Cargando artistas...</p>
    </div>

    <div class="type-filters" *ngIf="!isLoading() && artistTypes().length">
      <a routerLink="/es/artists" class="type-chip" [class.active]="!selectedTypeId()">Todos</a>
      <a
        *ngFor="let type of artistTypes()"
        [routerLink]="['/es/artists', type.slug]"
        class="type-chip"
        [class.active]="isTypeSelected(type.id)"
      >
        <span class="type-icon">
          <ng-container [ngSwitch]="getTypeIcon(type.alias)">
            <!-- Escultor: busto/estatua -->
            <svg
              *ngSwitchCase="'sculptor'"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="1.8"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <circle cx="12" cy="6" r="3" />
              <path d="M8 21v-3a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v3" />
              <path d="M7 12h10l-2 6H9z" />
            </svg>
            <!-- Pintor: pincel -->
            <svg
              *ngSwitchCase="'painter'"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="1.8"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M12 19l3-3 3 3" />
              <path d="M18 16l-4-4" />
              <path d="M3 21l3-3" />
              <path d="M21 3l-9 9" />
              <path d="M12 19l-3-3" />
            </svg>
            <!-- Iconógrafo: figura estilizada / icono -->
            <svg
              *ngSwitchCase="'iconographer'"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="1.8"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <rect x="3" y="3" width="18" height="18" rx="2" />
              <path d="M8 8h8" />
              <path d="M8 12h8" />
              <path d="M12 16c-1.5 0-2.5-1-3-2" />
            </svg>
            <!-- Orfebre: anillo / metal -->
            <svg
              *ngSwitchCase="'goldsmith'"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="1.8"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <circle cx="12" cy="12" r="4" />
              <path d="M12 2v2M12 20v2M2 12h2M20 12h2" />
              <path
                d="M5.64 5.64l1.42 1.42M16.94 16.94l1.42 1.42M5.64 18.36l1.42-1.42M16.94 7.06l1.42-1.42"
              />
            </svg>
            <!-- Ilustrador: lápiz -->
            <svg
              *ngSwitchCase="'illustrator'"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="1.8"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M12 19l7-7 3 3-7 7-3-3z" />
              <path d="M18 13l-1.5-7.5L2 2l3.5 14.5L13 18l5-5z" />
            </svg>
            <!-- Artesano textil: tejido -->
            <svg
              *ngSwitchCase="'textile'"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="1.8"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M4 4h4v4H4zM10 4h4v4h-4zM16 4h4v4h-4z" />
              <path d="M4 10h4v4H4zM10 10h4v4h-4zM16 10h4v4h-4z" />
              <path d="M4 16h4v4H4zM10 16h4v4h-4zM16 16h4v4h-4z" />
            </svg>
            <svg
              *ngSwitchDefault
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="1.8"
            >
              <circle cx="12" cy="6" r="3" />
              <path d="M8 21v-3a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v3" />
              <path d="M7 12h10l-2 6H9z" />
            </svg>
          </ng-container>
        </span>
        <span class="type-name">{{ type.name }}</span>
      </a>
    </div>

    <div class="type-description" *ngIf="currentType()?.description">
      <p>{{ currentType()?.description }}</p>
    </div>

    <div class="artists-grid" *ngIf="!isLoading()">
      <a
        *ngFor="let artist of filteredArtists()"
        class="artist-card"
        [routerLink]="['/es/artist', artist.id]"
      >
        <div class="avatar">
          <img [src]="artist.image || '/assets/placeholder-image.jpg'" [alt]="artist.name" />
        </div>
        <h3 class="artist-name">
          {{ artist.name }}<span *ngIf="artist.surname"> {{ artist.surname }}</span>
        </h3>
        <p class="artist-short-desc" *ngIf="artist.short_description">
          {{ artist.short_description }}
        </p>
      </a>
    </div>

    <div class="no-results" *ngIf="!isLoading() && filteredArtists().length === 0">
      <p>No hay artistas para el tipo seleccionado.</p>
    </div>
  </div>
</div>
